<!DOCTYPE html>
<html lang="en">
<head>
    <title>Registro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/registro.css" rel="stylesheet">
</head>
<body>

    <div class="opcion">
        <p>¿Ya tienes cuenta? </p>
        <a href="login.html">Inicia Sesion</a>
    </div>

    <div class="izquierda">

        <div class="imgagen">
            <a href="index.html">
                <img src="img/Gemini_Generated_Image_tsyu9ntsyu9ntsyu.png" alt="">
            </a>
        </div>

        <div class="formulario">
            <div class="contenedor">

                <h1>Registrate a Nova</h1>

                <form action="index.html">

                    <label>Tipo de documento</label>
                    <select>
                        <option>D.N.I</option>
                        <option>Pasaporte</option>
                        <option>C.E</option>
                    </select>

                    <label>Dni</label>
                    <input type="text" placeholder="N° Documento" required>

                    <label>Nombres</label>
                    <input type="text" placeholder="Introduce tu nombre" required>

                    <label>Apellido paterno</label>
                    <input type="text" placeholder="Paterno" required>

                    <label>Apellido materno</label>
                    <input type="text" placeholder="Materno" required>

                    <label>Fecha de nacimiento</label>
                    <input type="date" required>

                    <label>Sexo</label>
                    <select>
                        <option>Hombre</option>
                        <option>Mujer</option>
                    </select>

                    <label>Correo electronico</label>
                    <input type="email" placeholder="Ingrese su correo" required>

                    <label>Celular</label>
                    <input type="number" placeholder="Numero Telefonico" required>

                    <h1>Crea tu contraseña</h1>

                    <label>Contraseña</label>
                    <input type="password" placeholder="Ingresa tu contraseña" required>

                    <label>Confirmar contraseña</label>
                    <input type="password" placeholder="Verifica tu contraseña" required>

                    <div class="termino">
                        <input type="checkbox" required>
                        <label>Acepto los terminos y condiciones</label>
                    </div>

                    <button type="submit">Registrarse</button>

                </form>

            </div>
        </div>

    </div>

</body>
</html>
